services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mindmate_backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - db_data:/app/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mindmate_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
